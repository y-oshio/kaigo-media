name: ci
on:
  push: { branches: [main] }
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: kb-lint
        run: npm run kb-lint
      - name: content-lint
        run: npm run content-lint
      - name: verify:kyuryo
        run: npm run verify:kyuryo
      - name: typecheck
        run: npm run typecheck
      - name: build
        run: npm run build
